<style>
  :root {
    --color-blue: #0339A6;
    --color-midnight: #071A3D;
    --color-ivory: #FBF7EF;
    --color-white: #FFFFFF;
    --color-gold: #A47A1E;
    --color-gold-deep: #7A5A16;
    --color-grey: #5C6478;
    --color-grey-light: #67708D;
    --color-border: rgba(7,26,61,0.10);

    --font-display: 'Outfit', sans-serif;
    --font-editorial: 'Playfair Display', serif;
    --font-body: 'Manrope', sans-serif;

    --fs-display: clamp(2.3rem, 5.6vw, 5rem);
    --fs-body: clamp(0.95rem, 1.05vw, 1.0625rem);

    --space-x: clamp(20px, 5vw, 64px);
    --header-h: clamp(60px, 7.5vh, 76px);
    --radius-sm: 8px;
    --radius-md: 14px;
    --dur-fast: 0.2s;
    --dur-base: 0.4s;
    --ease-standard: cubic-bezier(0.22,1,0.36,1);
  }

  html, body { margin: 0; padding: 0; background: var(--color-white); }
  * { box-sizing: border-box; }
  body { font-family: var(--font-display); color: var(--color-midnight); overflow-x: hidden; }
  h1, p { margin: 0; }
  img { max-width: 100%; }

  :focus-visible { outline: 2px solid var(--color-gold); outline-offset: 3px; border-radius: 4px; }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation: none !important; transition: none !important; }
  }

  @keyframes maskReveal { from { transform: translateY(110%); } to { transform: translateY(0); } }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes fadeInUp { from { opacity: 0; transform: translateY(18px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes dotPulse { 0%, 100% { box-shadow: 0 0 0 0 rgba(164,122,30,0.4); } 70% { box-shadow: 0 0 0 7px rgba(164,122,30,0); } }
  @keyframes heroImgIn { from { transform: scale(1.06); } to { transform: scale(1); } }

  /* ==================== HEADER ==================== */
  .site-header {
    position: fixed; top: 0; left: 0; right: 0; z-index: 60;
    display: flex; align-items: center; justify-content: space-between; gap: 16px;
    padding: clamp(14px, 2vh, 20px) var(--space-x);
    background: linear-gradient(180deg, rgba(4,12,32,0.42), rgba(4,12,32,0));
    transition: background var(--dur-base) ease, box-shadow var(--dur-base) ease;
  }
  .site-header.is-scrolled {
    background: rgba(255,255,255,0.94);
    box-shadow: 0 1px 0 var(--color-border), 0 4px 24px rgba(7,26,61,0.08);
  }
  .brand { display: flex; align-items: center; gap: 12px; min-width: 0; }
  .brand img { width: 36px; height: 36px; border-radius: 50%; object-fit: cover; flex-shrink: 0; }
  .brand-name { font-size: 12.5px; font-weight: 800; letter-spacing: 3px; color: #fff; white-space: nowrap; transition: color var(--dur-base) ease; }
  .site-header.is-scrolled .brand-name { color: var(--color-blue); }

  .lang-switch { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
  .lang-divider { width: 1px; height: 13px; background: rgba(255,255,255,0.3); transition: background var(--dur-base) ease; }
  .site-header.is-scrolled .lang-divider { background: var(--color-border); }
  .lang-btn {
    padding: 2px 0; border: none; border-bottom: 2px solid transparent; background: transparent;
    color: rgba(255,255,255,0.65); font-family: var(--font-display); font-size: 12.5px; font-weight: 700;
    letter-spacing: 1.5px; cursor: pointer; transition: color var(--dur-base) ease, border-color var(--dur-base) ease;
  }
  .lang-btn.active { color: #fff; font-weight: 800; border-bottom-color: #fff; }
  .site-header.is-scrolled .lang-btn { color: var(--color-grey-light); }
  .site-header.is-scrolled .lang-btn.active { color: var(--color-blue); border-bottom-color: var(--color-blue); }

  /* ==================== HERO ==================== */
  .hero {
    position: relative; min-height: 100svh; width: 100%; overflow: hidden;
    display: flex; align-items: center;
    padding: calc(var(--header-h) + clamp(28px, 5vh, 56px)) var(--space-x) clamp(40px, 6vh, 72px);
  }
  .hero-media { position: absolute; inset: 0; z-index: 0; }
  .hero-media img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; object-position: center 60%; animation: heroImgIn 1.6s var(--ease-standard) both; }
  .hero-tint { position: absolute; inset: 0; background: linear-gradient(200deg, rgba(3,57,166,0.12), rgba(3,57,166,0) 55%); }
  .hero-reveal { position: absolute; inset: 0; background: linear-gradient(90deg, #FFFFFF 0%, #FFFFFF 28%, rgba(255,255,255,0.82) 38%, rgba(255,255,255,0.42) 52%, rgba(255,255,255,0.1) 68%, rgba(255,255,255,0) 84%); }
  @media (max-width: 980px) {
    .hero-reveal { background: linear-gradient(180deg, #FFFFFF 0%, #FFFFFF 55%, rgba(255,255,255,0.78) 74%, rgba(255,255,255,0.35) 90%, rgba(255,255,255,0.1) 100%); }
    .hero-tint { opacity: 0.7; }
  }

  .hero-grid {
    position: relative; z-index: 1; width: 100%; display: grid;
    grid-template-columns: repeat(auto-fit, minmax(min(100%, 460px), 1fr));
    gap: clamp(32px, 5vw, 80px); align-items: end;
  }
  .hero-copy { display: flex; flex-direction: column; gap: clamp(20px, 2.4vh, 28px); min-width: 0; }

  .hero-kicker { display: flex; align-items: center; gap: 12px; }
  .hero-kicker-line { width: 28px; height: 1px; background: var(--color-gold); flex-shrink: 0; }
  .hero-kicker-text { font-size: 11.5px; font-weight: 700; letter-spacing: 3px; color: var(--color-gold-deep); text-transform: uppercase; }

  .hero-title { font-size: var(--fs-display); font-weight: 800; line-height: 1.08; color: var(--color-blue); letter-spacing: -0.02em; }
  .hero-title .line { display: block; overflow: hidden; padding: 0.06em 0; }
  .hero-title .line span { display: block; animation: maskReveal 1s cubic-bezier(0.22,1,0.36,1) both; }
  .hero-title em { font-family: var(--font-editorial); font-style: italic; font-weight: 500; color: var(--color-gold-deep); letter-spacing: 0; }

  .hero-subtitle { font-family: var(--font-body); font-size: var(--fs-body); font-weight: 500; color: var(--color-grey); max-width: 500px; line-height: 1.7; }

  .status-mark { display: flex; flex-direction: column; gap: 12px; width: fit-content; max-width: 360px; }
  .status-main { display: flex; align-items: center; gap: 11px; }
  .status-dot-ring { position: relative; width: 12px; height: 12px; flex-shrink: 0; }
  .status-dot-ring::before {
    content: ""; position: absolute; inset: 0; border-radius: 50%; border: 1px solid var(--color-gold);
    opacity: 0.5; animation: ringPulse 2.4s ease-out infinite;
  }
  .status-dot-ring::after {
    content: ""; position: absolute; top: 3px; left: 3px; width: 6px; height: 6px; border-radius: 50%; background: var(--color-gold);
  }
  .status-text { font-size: 11.5px; font-weight: 700; letter-spacing: 2.4px; color: var(--color-blue); text-transform: uppercase; white-space: nowrap; }
  .status-rule { display: block; width: 100%; height: 1px; background: linear-gradient(90deg, var(--color-gold) 0%, rgba(164,122,30,0.18) 70%, rgba(164,122,30,0) 100%); }
  .status-secondary { font-family: var(--font-editorial); font-style: italic; font-size: 13.5px; font-weight: 500; color: var(--color-grey-light); }
  @keyframes ringPulse { 0% { transform: scale(0.6); opacity: 0.7; } 100% { transform: scale(2.2); opacity: 0; } }

  .hero-info-card {
    display: flex; flex-direction: column; max-width: 300px; justify-self: end; width: 100%;
    padding: 4px 20px; background: var(--color-white); border: 1px solid var(--color-border); border-radius: var(--radius-md);
  }
  .hero-info-row { display: flex; align-items: baseline; justify-content: space-between; gap: 16px; padding: 15px 0; border-top: 1px solid var(--color-border); }
  .hero-info-row:first-child { border-top: none; }
  .hero-info-label { font-size: 10.5px; font-weight: 700; letter-spacing: 2.2px; color: var(--color-grey-light); text-transform: uppercase; }
  .hero-info-value { font-family: var(--font-body); font-size: 14px; font-weight: 600; color: var(--color-midnight); text-align: right; }
  .hero-info-link { text-decoration: none; border-bottom: 1px solid transparent; transition: color var(--dur-fast) ease, border-color var(--dur-fast) ease; }
  .hero-info-link:hover, .hero-info-link:focus-visible { color: var(--color-blue); border-bottom-color: var(--color-blue); }

  /* ==================== FOOTER ==================== */
  .site-footer {
    display: flex; align-items: center; justify-content: space-between; gap: 14px;
    padding: 16px var(--space-x); border-top: 1px solid var(--color-border);
  }
  .footer-copyright { font-family: var(--font-body); font-size: 12px; color: var(--color-grey-light); white-space: nowrap; }
  .footer-credit { display: flex; align-items: center; gap: 7px; font-family: var(--font-body); font-size: 12px; font-weight: 500; color: var(--color-grey-light); white-space: nowrap; }
  .footer-credit img { width: 13px; height: 13px; border-radius: 3px; object-fit: cover; }
  .footer-credit strong { font-weight: 800; color: var(--color-midnight); letter-spacing: 0.6px; }
  .footer-credit:hover { color: var(--color-grey); }

  .footer-social { display: flex; align-items: center; gap: 14px; }
  .footer-social-icon {
    display: flex; align-items: center; justify-content: center; width: 44px; height: 44px;
    border-radius: 50%; background: rgba(3,57,166,0.07); color: var(--color-blue);
    transition: background var(--dur-fast) ease, color var(--dur-fast) ease, transform var(--dur-fast) ease, box-shadow var(--dur-fast) ease;
  }
  .footer-social-icon svg { width: 20px; height: 20px; }
  .footer-social-icon:hover { background: var(--color-gold); color: #fff; transform: translateY(-2px); box-shadow: 0 8px 20px rgba(164,122,30,0.3); }

  @media (max-width: 480px) {
    .site-footer { flex-direction: column; gap: 14px; text-align: center; padding: 18px var(--space-x); }
    .footer-social { order: -1; }
  }
</style>
</head>

<script>
  var copyByLang = {
    fr: {
      title: 'Djerba Mall — Site officiel en construction',
      description: 'Le site officiel de Djerba Mall est actuellement en construction. Une nouvelle expérience en ligne arrive prochainement.',
      kicker: 'Djerba Mall · Site officiel',
      titleLine1: 'Une nouvelle expérience',
      titleHighlight: 'arrive bientôt.',
      subtitle: 'Le site officiel de Djerba Mall est actuellement en construction. Nous préparons une nouvelle expérience en ligne pour vous faire découvrir prochainement nos boutiques, nos loisirs et nos actualités.',
      badge: 'Site en construction',
      badgeSecondary: 'Ouverture prochaine du site officiel',
      infoLocationLabel: 'Localisation',
      infoLocationValue: 'Djerba, Tunisie',
      infoStatusLabel: 'Statut',
      infoStatusValue: 'Site officiel en construction',
      footerCredit: 'Développé par'
    },
    en: {
      title: 'Djerba Mall — Official website coming soon',
      description: 'The official Djerba Mall website is currently under construction. A new online experience is coming soon.',
      kicker: 'Djerba Mall · Official website',
      titleLine1: 'A new experience',
      titleHighlight: 'is coming soon.',
      subtitle: 'The official Djerba Mall website is currently under construction. We are preparing a new online experience where you will soon be able to discover our shops, leisure activities and latest news.',
      badge: 'Website under construction',
      badgeSecondary: 'Official website coming soon',
      infoLocationLabel: 'Location',
      infoLocationValue: 'Djerba, Tunisia',
      infoStatusLabel: 'Status',
      infoStatusValue: 'Official website under construction',
      footerCredit: 'Developed by'
    }
  };

  function setText(id, val) { var el = document.getElementById(id); if (el) el.textContent = val; }
  function setAttr(id, attr, val) { var el = document.getElementById(id); if (el) el.setAttribute(attr, val); }

  function applyLang(lang) {
    var c = copyByLang[lang];
    setText('copy-kicker', c.kicker);
    setText('copy-titleLine1', c.titleLine1);
    setText('copy-titleHighlight', c.titleHighlight);
    setText('copy-subtitle', c.subtitle);
    setText('copy-badge', c.badge);
    setText('copy-badgeSecondary', c.badgeSecondary);
    setText('copy-infoLocationLabel', c.infoLocationLabel);
    setText('copy-infoLocationValue', c.infoLocationValue);
    setText('copy-infoStatusLabel', c.infoStatusLabel);
    setText('copy-infoStatusValue', c.infoStatusValue);
    setText('copy-footerCredit', c.footerCredit);

    document.title = c.title;
    setAttr('docDescription', 'content', c.description);
    setAttr('ogTitle', 'content', c.title);
    setAttr('ogDescription', 'content', c.description);
    setAttr('twitterTitle', 'content', c.title);
    setAttr('twitterDescription', 'content', c.description);

    document.documentElement.lang = lang;
    var fr = document.getElementById('btn-fr'), en = document.getElementById('btn-en');
    fr.classList.toggle('active', lang === 'fr'); fr.setAttribute('aria-pressed', lang === 'fr');
    en.classList.toggle('active', lang === 'en'); en.setAttribute('aria-pressed', lang === 'en');
  }

  function setLang(lang) {
    applyLang(lang);
    try { localStorage.setItem('djerbamall-lang', lang); } catch (e) {}
  }

  (function initLang() {
    var saved = 'fr';
    try { saved = localStorage.getItem('djerbamall-lang') || 'fr'; } catch (e) {}
    applyLang(saved);
  })();

  (function headerScroll() {
    var header = document.getElementById('siteHeader');
    function update() {
      if (window.scrollY > 12) header.classList.add('is-scrolled');
      else header.classList.remove('is-scrolled');
    }
    update();
    window.addEventListener('scroll', update, { passive: true });
  })();
</script>
